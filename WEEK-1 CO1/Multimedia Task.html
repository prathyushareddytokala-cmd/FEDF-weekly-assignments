<!DOCTYPE html>
<html>
<head>
<title>Multimedia Page</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #ffecd2, #fcb69f);
    margin: 0;
}

/* Header */
header {
    background: #333;
    color: white;
    text-align: center;
    padding: 15px;
}

/* Sections */
section {
    background: white;
    margin: 20px;
    padding: 20px;
    border-radius: 10px;
}

/* Media styling */
img, video, iframe {
    display: block;
    margin: 10px auto;
    border-radius: 10px;
}

audio {
    display: block;
    margin: 10px auto;
}

/* Footer */
footer {
    background: #333;
    color: white;
    text-align: center;
    padding: 10px;
}
</style>

</head>

<body>

<header>
<h1>Multimedia Webpage</h1>
<p>Image, Audio, Video & Map</p>
</header>

<section>
<h2>Image</h2>
<img src="image.jpg" width="300">
<p>This is a sample image displayed on the webpage.</p>
</section>

<section>
<h2>Audio</h2>
<audio controls>
<source src="audio.mp3">
</audio>
<p>This is an audio file that can be played.</p>
</section>

<section>
<h2>Video</h2>
<video width="300" controls>
<source src="video.mp4">
</video>
<p>This is a sample video file.</p>
</section>

<section>
<h2>Location (Map)</h2>
<iframe src="https://maps.google.com" width="300" height="200"></iframe>
<p>This shows a location using iframe.</p>
</section>

<footer>
<p>© 2026 Multimedia Page</p>
</footer>

</body>
</html>
