<!DOCTYPE html>
<html>
<head>

<style>
body { font-family:Arial; }
table { border-collapse:collapse; width:100%; }
th, td { border:1px solid black; padding:10px; }
</style>
</head>

<body>

<h1>Online Book Store</h1>

<p><mark>Special Offer: 20% OFF</mark></p>

<img src="book.jpg" width="150">

<th>Name</th>
<th>Author</th>
<th>Price</th>
</tr>
<tr>

</tr>
</table>

<h2>Order</h2>
