<!DOCTYPE html>
<html>
<head>
  <title>Armstrong Numbers</title>
</head>
<body>

Lower: <input id="low"><br><br>
Upper: <input id="high"><br><br>

<button onclick="findArmstrong()">Find</button>

<p id="result"></p>

<script>
function findArmstrong() {
  let low = Number(document.getElementById("low").value);
  let high = Number(document.getElementById("high").value);
  let output = "";

  for (let i = low; i <= high; i++) {
    let num = i;
    let sum = 0;
    let digits = i.toString().length;

    while (num > 0) {
      let rem = num % 10;
      sum += rem ** digits;
      num = Math.floor(num / 10);
    }

    if (sum === i) {
      output += i + " ";
    }
  }

  document.getElementById("result").innerText = output;
}
</script>

</body>
</html>
